<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fleet Investment Service - Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="brand">Rappi</div>
        <div class="subtitle">Fleet Investment Service</div>
      </div>

      <div id="login-error" class="login-error">
        Usuario o contrasena incorrectos
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Contrasena</label>
          <input type="password" id="password" placeholder="Ingresa tu contrasena" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary">Iniciar sesion</button>
      </form>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (sessionStorage.getItem('fleet_auth') === 'ok') {
      window.location.href = '/dashboard';
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;

      if (user === 'martin' && pass === 'admin123') {
        sessionStorage.setItem('fleet_auth', 'ok');
        sessionStorage.setItem('fleet_user', user);
        window.location.href = '/dashboard';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
